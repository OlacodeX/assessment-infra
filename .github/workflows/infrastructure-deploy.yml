name: Infrastructure Deploy

on:
  push:
    branches:
      - master

env:
  TF_WORKING_DIR: terraform
  AWS_REGION: us-east-1

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        env:
          TF_VAR_mongodb_uri: ${{ secrets.TF_VAR_mongodb_uri }}
          TF_VAR_jwt_secret: ${{ secrets.TF_VAR_jwt_secret }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feature/full-stack'
        env:
          TF_VAR_mongodb_uri: ${{ secrets.TF_VAR_mongodb_uri }}
          TF_VAR_jwt_secret: ${{ secrets.TF_VAR_jwt_secret }}
        run: terraform apply -auto-approve tfplan

      - name: Post apply outputs
        if: success()
        run: |
          echo "## Terraform outputs (sync to application repo secrets)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          terraform output >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
